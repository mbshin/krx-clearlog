transaction_code: TCSMIH43601
description: 장중추가증거금 — 증거금기준가격 (증권시장)
market: equity
encoding: euc-kr
record_length: 1200

# Repeating group (issues): 30 × 35 bytes = 1,050 bytes.
# Source-spec typo: seq 2 TRANSACTION_CODE literal prints as `TCSMIH43501`;
# correct literal is `TCSMIH43601` (tracked in messages.md §Issues).

layout:
  - kind: field
    name: MESSAGE_SEQUENCE_NUMBER
    kor_name: 메세지일련번호
    kor_description: 메시지 일련번호
    type: Long
    length: 11
  - kind: field
    name: TRANSACTION_CODE
    kor_name: 트랜잭션코드
    kor_description: 거래 코드 (TCSMIH43601)
    type: String
    length: 11
  - kind: field
    name: TRANSMIT_DATE
    kor_name: 전송일자
    kor_description: 전송일자 YYYYMMDD
    type: String
    length: 8
  - kind: field
    name: EMSG_COMPLT_YN
    kor_name: 전문완료여부
    kor_description: Y=전송완료, N=전송중
    type: String
    length: 1
  - kind: field
    name: ROUND_NUMBER
    kor_name: 회차번호
    kor_description: 회차번호
    type: Long
    length: 4
  - kind: field
    name: ROUND_TIME
    kor_name: 회차시각
    kor_description: HHMMSSsss
    type: String
    length: 9
  - kind: field
    name: CALCULATE_BASE_TIME
    kor_name: 데이터산출기준시각
    kor_description: HHMMSSsss
    type: String
    length: 9
  - kind: array
    name: issues
    count: 30
    fields:
      - name: MARKET_IDENTIFICATION
        kor_name: 시장ID
        kor_description: KRX 차세대 상품 ID체계 — 시장ID
        type: String
        length: 3
      - name: SECURITIES_GROUP_IDENTIFICATION
        kor_name: 증권그룹ID
        kor_description: KRX 차세대 상품 ID체계 — 증권그룹ID
        type: String
        length: 2
      - name: ISSUE_CODE
        kor_name: 종목코드
        kor_description: 종목코드
        type: String
        length: 12
      - name: MARGIN_BASE_PRICE
        kor_name: 증거금기준가격
        kor_description: 증거금 기준가격
        type: Float
        length: 18
        int_digits: 9
        frac_digits: 8
  - kind: field
    name: FILLER_VALUE
    kor_name: 필러값
    kor_description: 예비 영역
    type: String
    length: 97
