    type: Float
    length: 10
    int_digits: 7
    frac_digits: 2
  - kind: field
    name: IMPOST_BAS_TM_T_PLUS_1
    kor_name: 부과기준시각(T+1시)
    kor_description: HHMMSSsss (T+1시)
    type: String
    length: 9
  - kind: field
    name: IMPOST_BAS_TM_TOT_DEPO_AMT_T_PLUS_1
    kor_name: 부과기준시각_총예탁금액(T+1시)
    kor_description: 단위 원 (T+1시)
    type: Float
    length: 22
    int_digits: 18
    frac_digits: 3
  - kind: field
    name: IM
    kor_name: 장중추가증거금
    kor_description: 납부 대상 금액; 필요액합계(T) + 예탁금액(T+1) < 0; 단위 원
    type: Float
    length: 22
    int_digits: 18
    frac_digits: 3
  - kind: field
    name: FINAL_TM
    kor_name: 확정시각
    kor_description: HHMMSSsss 부과확정시각
    type: String
    length: 9
  - kind: field
    name: PAY_DEADLINE
    kor_name: 납부시한
    kor_description: HHMMSSsss 확정시각 + 2시간
