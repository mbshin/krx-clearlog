    length: 28
    int_digits: 24
    frac_digits: 3
  - kind: field
    name: REQVAL_AGG
    kor_name: 필요액합계
    kor_description: 위탁 + 자기; ≤ 0; 단위 원
    type: Float
    length: 28
    int_digits: 24
    frac_digits: 3
  - kind: field
    name: IMPOST_BAS_TM_T
    kor_name: 부과산출기준시각(T시)
    kor_description: HHMMSSsss (T시)
    type: String
    length: 9
  - kind: field
    name: IMPOST_BAS_TM_TOT_DEPO_AMT_T
